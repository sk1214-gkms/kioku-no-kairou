name: kioku_no_kairou
description: "記憶の回廊（仮） - 1画面完結型 脱出ミステリー (MVP)"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  # google_mobile_ads: ^5.1.0   # マネタイズ時に有効化（lib/ad_service.dart も AdMob版へ戻す）

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  # データはエンジン非依存の JSON をそのまま読み込む
  assets:
    - data/
    - data/stages/
    - data/deep_rooms/

  # 亜簪文字（黒文字体）フォント。HUD / 結末 / R13収束の符号を亀甲文字にする。
  # 有効化手順（自宅PCで）:
  #   1) Google Fonts「UnifrakturMaguntia」(OFL) の .ttf を入手
  #   2) assets/fonts/UnifrakturMaguntia-Regular.ttf として配置
  #   3) 下の fonts: ブロックのコメントを外す
  # ※ 未配置でもコードは fontFamily:'Blackletter' を標準フォントにフォールバックしビルドは通る。
  # fonts:
  #   - family: Blackletter
  #     fonts:
  #       - asset: assets/fonts/UnifrakturMaguntia-Regular.ttf
