name: kioku_no_kairou
description: "アムネジィ・ケース ──教授の不完全な安楽── - スマホ向け脱出ミステリー（旧称: 記憶の回廊）"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  # google_mobile_ads: ^5.1.0   # マネタイズ時に有効化（lib/ad_service.dart も AdMob版へ戻す）

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  # データはエンジン非依存の JSON をそのまま読み込む
  # ※実行時に使うものだけを明示列挙（data/image の生成元jpg等は同梱しない＝容量削減）
  assets:
    - data/deep_rooms/
    - data/text_ja.json
    - data/endings.json
    - data/cipher.json
    - assets/images/rooms/
    - assets/images/items/
    - assets/icon/app_icon.png   # タイトル画面の紋章として表示（アプリの顔と一致）

  # 亜簪文字（黒文字体）フォント。HUD / 結末 / R13収束の符号を亀甲文字にする。
  # 有効化手順（自宅PCで）:
  #   1) Google Fonts「UnifrakturMaguntia」(OFL) の .ttf を入手
  #   2) assets/fonts/UnifrakturMaguntia-Regular.ttf として配置
  #   3) 下の fonts: ブロックのコメントを外す
  # ※ 未配置でもコードは fontFamily:'Blackletter' を標準フォントにフォールバックしビルドは通る。
  # fonts:
  #   - family: Blackletter
  #     fonts:
  #       - asset: assets/fonts/UnifrakturMaguntia-Regular.ttf
